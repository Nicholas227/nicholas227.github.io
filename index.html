<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evil Wordle</title>
    <style>
        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            alignment-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #121213;
            color: white;
        }
        #game {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            margin-bottom: 20px;
        }
        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
        }
        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid #3a3a3c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
        }
        .tile[data-state="correct"] { background-color: #538d4e; border-color: #538d4e; }
        .tile[data-state="present"] { background-color: #b59f3b; border-color: #b59f3b; }
        .tile[data-state="absent"] { background-color: #3a3a3c; border-color: #3a3a3c; }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .kb-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .key {
            background-color: #818384;
            border: 0;
            border-radius: 4px;
            padding: 15px 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .key.wide {
            padding: 15px 20px;
        }
    </style>
</head>
<body>
    <div id="game">
        <h1>Evil Wordle</h1>
        <div class="grid" id="grid"></div>
        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
        const ALL_WORDS = ["AWING", "AGLOW", "CUTIE", "CHARM", "SMILE", "SWEET", "BELLE"];
        let possibleWords = [...ALL_WORDS];
        let currentGuess = "";
        let currentRow = 0;
        const maxGuesses = 6;

        function init() {
            const grid = document.getElementById("grid");
            for (let i = 0; i < maxGuesses; i++) {
                const row = document.createElement("div");
                row.className = "row";
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement("div");
                    tile.className = "tile";
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }

            const kb = document.getElementById("keyboard");
            const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
            rows.forEach((rowStr, i) => {
                const row = document.createElement("div");
                row.className = "kb-row";
                if (i === 2) {
                    const enter = document.createElement("button");
                    enter.className = "key wide";
                    enter.textContent = "ENTER";
                    enter.onclick = submitGuess;
                    row.appendChild(enter);
                }
                for (const char of rowStr) {
                    const key = document.createElement("button");
                    key.className = "key";
                    key.textContent = char;
                    key.onclick = () => addLetter(char);
                    row.appendChild(key);
                }
                if (i === 2) {
                    const back = document.createElement("button");
                    back.className = "key wide";
                    back.textContent = "DEL";
                    back.onclick = deleteLetter;
                    row.appendChild(back);
                }
                kb.appendChild(row);
            });
        }

        function addLetter(letter) {
            if (currentGuess.length < 5 && currentRow < maxGuesses) {
                currentGuess += letter;
                updateGrid();
            }
        }

        function deleteLetter() {
            currentGuess = currentGuess.slice(0, -1);
            updateGrid();
        }

        function updateGrid() {
            const row = document.getElementsByClassName("row")[currentRow];
            const tiles = row.getElementsByClassName("tile");
            for (let i = 0; i < 5; i++) {
                tiles[i].textContent = currentGuess[i] || "";
            }
        }

        function getPattern(guess, target) {
            let pattern = ["absent", "absent", "absent", "absent", "absent"];
            let targetArr = target.split("");
            let guessArr = guess.split("");

            // First pass: Correct positions
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === targetArr[i]) {
                    pattern[i] = "correct";
                    targetArr[i] = null;
                    guessArr[i] = null;
                }
            }
            // Second pass: Present elsewhere
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] !== null) {
                    let index = targetArr.indexOf(guessArr[i]);
                    if (index !== -1) {
                        pattern[i] = "present";
                        targetArr[index] = null;
                    }
                }
            }
            return pattern.join(",");
        }

        function submitGuess() {
            if (currentGuess.length !== 5) return;

            // Evil Logic: Find the pattern with the least information (fewest greens, then fewest yellows)
            const patterns = {};
            possibleWords.forEach(word => {
                const p = getPattern(currentGuess, word);
                if (!patterns[p]) patterns[p] = [];
                patterns[p].push(word);
            });

            let bestPattern = "";
            let minGreens = Infinity;
            let minYellows = Infinity;
            for (const p in patterns) {
                const patternArr = p.split(",");
                const greens = patternArr.filter(x => x === "correct").length;
                const yellows = patternArr.filter(x => x === "present").length;
                
                if (greens < minGreens || (greens === minGreens && yellows < minYellows)) {
                    minGreens = greens;
                    minYellows = yellows;
                    bestPattern = p;
                }
            }

            possibleWords = patterns[bestPattern];
            const patternArr = bestPattern.split(",");
            
            const row = document.getElementsByClassName("row")[currentRow];
            const tiles = row.getElementsByClassName("tile");
            for (let i = 0; i < 5; i++) {
                tiles[i].setAttribute("data-state", patternArr[i]);
            }

            if (bestPattern === "correct,correct,correct,correct,correct") {
                alert("You won? Impossible! Here is your reward: 3 2");
            } else if (currentRow === maxGuesses - 1) {
                alert("You lost! The word could have been: " + possibleWords[0]);
            }

            currentRow++;
            currentGuess = "";
        }

        init();
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") submitGuess();
            else if (e.key === "Backspace") deleteLetter();
            else if (/^[a-zA-Z]$/.test(e.key)) addLetter(e.key.toUpperCase());
        });
    </script>
</body>
</html>
